<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Buttons Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>CSS Buttons Demo</h1>
      <p>A collection of colorful buttons styled with CSS</p>
    </header>

    <main>
      <section>
        <h2>Basic Buttons</h2>
        <button class="btn-primary">Primary Button</button>
        <button class="btn-secondary">Secondary Button</button>
        <button class="btn-success">Success Button</button>
        <button class="btn-danger">Danger Button</button>
      </section>

      <section>
        <h2>Outline Buttons</h2>
        <button class="btn-outline-primary">Primary Outline</button
        ><button class="btn-outline-secondary">Secondary Outline</button
        ><button class="btn-outline-success">Success Outline</button
        ><button class="btn-outline-danger">Danger Outline</button>
      </section>

      <section>
        <h2>Rounded Buttons</h2>
        <button class="btn-rounded-primary">Rounded Primary</button
        ><button class="btn-rounded-secondary">Rounded Secondary</button>
      </section>

      <section>
        <h2>Button Sizes</h2>
        <button class="btn-small">Small</button
        ><button class="btn-medium">Medium</button
        ><button class="btn-large">Large</button>
      </section>

      <section>
        <h2>Disabled Button</h2>
        <button class="btn-primary" disabled>Disabled Button</button>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 CSS Buttons Demo</p>
    </footer>
  </body>
</html>
