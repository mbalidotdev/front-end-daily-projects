<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
  </head>
  <body>
    <div>
      <h1>My Image Gallery</h1>
      <p>A collection of my favorite places and memories.</p>

      <h2>Nature</h2>

      <figure>
        <img
          src="https://placehold.co/300x200"
          alt="Mountain landscape"
          width="300"
        />
        <figcaption>Sunset in the mountains</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Forest path" width="300" />
        <figcaption>Walking through the autumn forest</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Ocean waves" width="300" />
        <figcaption>Peaceful ocean view</figcaption>
      </figure>

      <h2>City Life</h2>

      <figure>
        <img
          src="https://placehold.co/300x200"
          alt="City skyline"
          width="300"
        />
        <figcaption>Downtown skyline at night</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Coffee shop" width="300" />
        <figcaption>My favorite coffee shop</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Street art" width="300" />
        <figcaption>Colorful street art</figcaption>
      </figure>

      <h2>Food</h2>

      <figure>
        <img src="https://placehold.co/300x200" alt="Pizza" width="300" />
        <figcaption>Homemade pizza night</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Pasta" width="300" />
        <figcaption>Fresh pasta carbonara</figcaption>
      </figure>

      <figure>
        <img src="https://placehold.co/300x200" alt="Dessert" width="300" />
        <figcaption>Chocolate fondue dessert</figcaption>
      </figure>
    </div>
  </body>
</html>
